<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugar Monday — Content Hub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0f0f0f;--surface:#1a1a1a;--card:#222;--border:#2e2e2e;--border2:#3a3a3a;
    --text:#f0ede6;--muted:#888;--soft:#555;
    --cream:#f5efe4;--brown:#8b6343;--brown-light:#c4956a;
    --green:#2d6a4f;--green-light:#52b788;--green-bg:#1a2e25;
    --blue:#1d4e89;--blue-light:#4a9eff;--blue-bg:#0d1f35;
    --orange:#c44b0a;--orange-light:#f4845f;--orange-bg:#2e1205;
    --purple:#5b2d8e;--purple-light:#a78bfa;--purple-bg:#1e0f35;
    --pink:#8b1a4a;--pink-light:#f472b6;--pink-bg:#2e0a1e;
    --radius:8px;
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}

  .app{max-width:960px;margin:0 auto;padding:2rem 1.25rem 4rem;}

  .header{margin-bottom:2rem;}
  .header h1{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px;}
  .header p{font-size:13px;color:var(--muted);}
  .deadline-chip{display:inline-flex;align-items:center;gap:6px;background:var(--orange-bg);color:var(--orange-light);border:1px solid var(--orange);border-radius:20px;padding:4px 12px;font-size:12px;margin-top:8px;}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.5rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .stat-label{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .stat-val{font-size:22px;font-weight:600;}
  .stat-val.green{color:var(--green-light);}
  .stat-val.blue{color:var(--blue-light);}
  .stat-val.orange{color:var(--orange-light);}
  .stat-val.muted{color:var(--muted);}

  .tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid var(--border);padding-bottom:0;}
  .tab{padding:8px 16px;background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--cream);border-bottom-color:var(--brown-light);}

  .toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
  .toolbar input,.toolbar select{font-size:13px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);height:34px;}
  .toolbar input{flex:1;min-width:140px;}
  .toolbar input::placeholder{color:var(--soft);}
  .btn-new{margin-left:auto;padding:7px 16px;border-radius:var(--radius);background:var(--cream);color:#111;border:none;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;height:34px;white-space:nowrap;}
  .btn-new:hover{background:#e8e0d4;}

  /* TABLE */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border2);color:var(--muted);font-weight:500;white-space:nowrap;}
  td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:hover td{background:var(--surface);}
  .cell-title{font-weight:500;max-width:220px;line-height:1.4;}

  .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;margin:2px 2px 2px 0;}
  .b-ig{background:var(--pink-bg);color:var(--pink-light);border:1px solid var(--pink);}
  .b-story{background:var(--purple-bg);color:var(--purple-light);border:1px solid var(--purple);}
  .b-tt{background:var(--blue-bg);color:var(--blue-light);border:1px solid var(--blue);}
  .b-xhs{background:#2e0a0a;color:#f87171;border:1px solid #7f1d1d;}
  .b-fb{background:#0d1f35;color:#60a5fa;border:1px solid #1e3a5f;}
  .b-campaign{background:#2e1c05;color:#fbbf24;border:1px solid #78350f;}
  .b-store{background:var(--green-bg);color:var(--green-light);border:1px solid var(--green);}
  .b-daily{background:var(--purple-bg);color:var(--purple-light);border:1px solid var(--purple);}

  .status{display:inline-flex;align-items:center;gap:5px;font-size:12px;white-space:nowrap;}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .d-done{background:#22c55e;}.d-prog{background:#3b82f6;}.d-none{background:#4b5563;}.d-review{background:#f97316;}

  .review-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--orange-light);background:var(--orange-bg);border:1px solid var(--orange);padding:2px 8px;border-radius:20px;}

  .act-btn{background:none;border:none;cursor:pointer;color:var(--soft);padding:4px;border-radius:4px;font-size:14px;line-height:1;}
  .act-btn:hover{color:var(--text);background:var(--border);}

  /* BOARD */
  .board{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;}
  .col-head{font-size:12px;font-weight:500;color:var(--muted);padding:4px 2px;display:flex;align-items:center;gap:6px;margin-bottom:8px;}
  .col-count{background:var(--border);border-radius:20px;font-size:11px;padding:1px 7px;color:var(--soft);}
  .kanban-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
  .kanban-card:hover{border-color:var(--border2);}
  .kcard-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4;}
  .kcard-date{font-size:11px;color:var(--muted);margin-top:6px;}

  /* CALENDAR */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-title{font-size:16px;font-weight:500;}
  .cal-nav{display:flex;gap:6px;}
  .cal-nav button{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;}
  .cal-nav button:hover{color:var(--text);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
  .cal-day-lbl{background:var(--surface);text-align:center;font-size:11px;color:var(--muted);padding:7px 4px;font-weight:500;}
  .cal-cell{background:var(--bg);min-height:86px;padding:6px;cursor:default;}
  .cal-cell.other{opacity:.35;}
  .cal-cell.today{background:#1a1500;}
  .cal-num{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .cal-cell.today .cal-num{color:var(--brown-light);font-weight:600;}
  .cal-evt{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.4;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
  .modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:1.5rem;width:min(480px,100%);max-height:88vh;overflow-y:auto;}
  .modal h2{font-size:16px;font-weight:600;margin-bottom:1.25rem;}
  .form-row{margin-bottom:12px;}
  .form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;}
  .form-row textarea{resize:vertical;min-height:60px;}
  .platform-checks{display:flex;flex-wrap:wrap;gap:10px;}
  .platform-checks label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;color:var(--text);}
  .modal-btns{display:flex;gap:8px;margin-top:1.25rem;justify-content:flex-end;}
  .btn-cancel{padding:7px 18px;border-radius:var(--radius);background:none;border:1px solid var(--border2);color:var(--muted);font-size:13px;cursor:pointer;}
  .btn-save{padding:7px 18px;border-radius:var(--radius);background:var(--cream);color:#111;border:none;font-size:13px;font-weight:500;cursor:pointer;}
  .btn-cancel:hover{color:var(--text);}
  .btn-save:hover{background:#e8e0d4;}

  .empty{text-align:center;padding:2.5rem;color:var(--soft);font-size:13px;}
  .section-divider{height:1px;background:var(--border);margin:1.5rem 0;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📋 Sugar Monday — Content Hub</h1>
    <p>จัดการคอนเทนต์ทุกช่องทาง · Instagram · TikTok · Xiaohongshu · Facebook</p>
    <div class="deadline-chip">⏰ Deadline: ส่งงาน Review ทุกวันพฤหัสฯ 14:00 น.</div>
  </div>

  <div id="stats" class="stats"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchView('table')">📄 ทั้งหมด</button>
    <button class="tab" onclick="switchView('board')">📌 Board</button>
    <button class="tab" onclick="switchView('calendar')">📅 Calendar</button>
    <button class="tab" onclick="switchView('review')">👁 ต้องตรวจ</button>
  </div>

  <div class="toolbar">
    <input id="search" type="text" placeholder="ค้นหาคอนเทนต์..." oninput="render()">
    <select id="fp" onchange="render()">
      <option value="">ทุก Platform</option>
      <option>IG Post</option><option>IG Story</option><option>TikTok</option>
      <option>Xiaohongshu</option><option>Facebook</option>
    </select>
    <select id="fs" onchange="render()">
      <option value="">ทุก Status</option>
      <option>Not started</option><option>In progress</option><option>Done</option><option>Review</option>
    </select>
    <button class="btn-new" onclick="openModal()">+ เพิ่มคอนเทนต์</button>
  </div>

  <div id="main"></div>
</div>

<div id="mbg" class="modal-bg" style="display:none" onclick="closeMBg(event)">
  <div class="modal">
    <h2 id="mtitle">เพิ่มคอนเทนต์</h2>
    <div class="form-row"><label>ชื่อ</label><input id="f-title" type="text" placeholder="เช่น IG Story — Product close-up"></div>
    <div class="form-row"><label>Caption</label><textarea id="f-cap" placeholder="Caption สำหรับโพสต์..."></textarea></div>
    <div class="form-row"><label>ประเภทคอนเทนต์</label>
      <select id="f-type">
        <option>Daily Story</option><option>IG Post</option><option>TikTok</option>
        <option>Xiaohongshu</option><option>Campaign AW</option><option>Store Promo</option>
      </select>
    </div>
    <div class="form-row"><label>Platform</label>
      <div class="platform-checks">
        <label><input type="checkbox" id="p0" value="IG Post"> IG Post</label>
        <label><input type="checkbox" id="p1" value="IG Story"> IG Story</label>
        <label><input type="checkbox" id="p2" value="TikTok"> TikTok</label>
        <label><input type="checkbox" id="p3" value="Xiaohongshu"> Xiaohongshu</label>
        <label><input type="checkbox" id="p4" value="Facebook"> Facebook</label>
      </div>
    </div>
    <div class="form-row"><label>วันที่โพสต์</label><input id="f-date" type="date"></div>
    <div class="form-row"><label>Status</label>
      <select id="f-status">
        <option>Not started</option><option>In progress</option><option>Done</option><option>Review</option>
      </select>
    </div>
    <div class="form-row"><label>ต้อง Review?</label>
      <select id="f-rev"><option value="0">ไม่</option><option value="1">ใช่</option></select>
    </div>
    <div class="form-row"><label>Notes / Key Message</label><textarea id="f-notes" placeholder="รายละเอียดเพิ่มเติม..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-save" onclick="saveItem()">บันทึก</button>
    </div>
  </div>
</div>

<script>
const PBADGE = {'IG Post':'b-ig','IG Story':'b-story','TikTok':'b-tt','Xiaohongshu':'b-xhs','Facebook':'b-fb'};
const TBADGE = {'Campaign AW':'b-campaign','Store Promo':'b-store','Daily Story':'b-daily','TikTok':'b-tt','Xiaohongshu':'b-xhs','IG Post':'b-ig'};
const SDOT = {'Done':'d-done','In progress':'d-prog','Not started':'d-none','Review':'d-review'};
const CEVT = {'IG Post':'#f472b6','IG Story':'#a78bfa','TikTok':'#60a5fa','Xiaohongshu':'#f87171','Facebook':'#93c5fd','Campaign AW':'#fbbf24','Store Promo':'#34d399'};

let items=[
  {id:1,title:'6.6 Campaign — โพสต์โปรโมชั่นหลัก',cap:'',type:'Campaign AW',platforms:['IG Post','Facebook'],date:'2026-06-06',status:'Done',rev:true,notes:'Key message: 6.6 Special — ลด 15% ทุกออเดอร์ วันที่ 6 มิ.ย. เท่านั้น\nObjective: โปรโมท campaign 6.6 เพื่อกระตุ้นยอดขายออนไลน์'},
  {id:2,title:'IG Story — วันจันทร์ (Product close-up)',cap:'',type:'Daily Story',platforms:['IG Story'],date:'2026-06-02',status:'Not started',rev:false,notes:''},
  {id:3,title:"TikTok — What's in my bag (PLEAT Beige)",cap:'',type:'TikTok',platforms:['TikTok'],date:'2026-06-04',status:'Not started',rev:true,notes:''},
  {id:4,title:'Xiaohongshu — New Arrival POPPY Yellow',cap:'',type:'Xiaohongshu',platforms:['Xiaohongshu'],date:'2026-06-07',status:'Not started',rev:true,notes:''},
  {id:5,title:'Emporium Promotion Poster',cap:'',type:'Store Promo',platforms:['IG Post'],date:'',status:'Not started',rev:true,notes:''},
];
let nid=6, view='table', eid=null;
let calM=new Date(2026,5,1);

function switchView(v){
  view=v;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['table','board','calendar','review'][i]===v));
  render();
}

function filtered(){
  const q=document.getElementById('search').value.toLowerCase();
  const fp=document.getElementById('fp').value;
  const fs=document.getElementById('fs').value;
  return items.filter(i=>{
    if(q&&!i.title.toLowerCase().includes(q)&&!i.cap.toLowerCase().includes(q)) return false;
    if(fp&&!i.platforms.includes(fp)) return false;
    if(fs&&i.status!==fs) return false;
    return true;
  });
}

function pbadges(ps){return ps.map(p=>`<span class="badge ${PBADGE[p]||'b-ig'}">${p}</span>`).join('');}

function renderStats(){
  const a=items;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">ทั้งหมด</div><div class="stat-val">${a.length}</div></div>
    <div class="stat"><div class="stat-label">Done</div><div class="stat-val green">${a.filter(i=>i.status==='Done').length}</div></div>
    <div class="stat"><div class="stat-label">In progress</div><div class="stat-val blue">${a.filter(i=>i.status==='In progress').length}</div></div>
    <div class="stat"><div class="stat-label">Needs review</div><div class="stat-val orange">${a.filter(i=>i.rev).length}</div></div>
    <div class="stat"><div class="stat-label">Not started</div><div class="stat-val muted">${a.filter(i=>i.status==='Not started').length}</div></div>
  `;
}

function renderTable(){
  const d=filtered();
  if(!d.length) return '<div class="empty">ไม่พบคอนเทนต์ · ลองเพิ่มใหม่ได้เลย</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>ชื่อ</th><th>ประเภท</th><th>Platform</th><th>วันที่โพสต์</th><th>Status</th><th>Review</th><th></th></tr></thead>
    <tbody>${d.map(i=>`<tr>
      <td class="cell-title">${i.title}</td>
      <td><span class="badge ${TBADGE[i.type]||'b-ig'}">${i.type}</span></td>
      <td>${pbadges(i.platforms)}</td>
      <td style="color:var(--muted);font-size:12px">${i.date||'—'}</td>
      <td><span class="status"><span class="dot ${SDOT[i.status]||'d-none'}"></span>${i.status||'—'}</span></td>
      <td>${i.rev?'<span class="review-chip">👁 Review</span>':''}</td>
      <td style="white-space:nowrap">
        <button class="act-btn" onclick="openModal(${i.id})" title="แก้ไข">✎</button>
        <button class="act-btn" onclick="del(${i.id})" title="ลบ">✕</button>
      </td>
    </tr>`).join('')}</tbody></table></div>`;
}

function renderBoard(){
  const cols=['Not started','In progress','Done','Review'];
  const all=filtered();
  return `<div class="board">${cols.map(col=>{
    const cards=all.filter(i=>i.status===col);
    return `<div>
      <div class="col-head"><span class="dot ${SDOT[col]}"></span>${col}<span class="col-count">${cards.length}</span></div>
      ${cards.length?cards.map(i=>`<div class="kanban-card" onclick="openModal(${i.id})">
        <div class="kcard-title">${i.title}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px">
          <span class="badge ${TBADGE[i.type]||'b-ig'}">${i.type}</span>
          ${pbadges(i.platforms)}
        </div>
        ${i.date?`<div class="kcard-date">📅 ${i.date}</div>`:''}
        ${i.rev?'<div style="margin-top:6px"><span class="review-chip">👁 Needs review</span></div>':''}
      </div>`).join(''):'<div class="empty" style="padding:.75rem 0;font-size:12px">ว่างอยู่</div>'}
    </div>`;
  }).join('')}</div>`;
}

function renderCalendar(){
  const y=calM.getFullYear(), m=calM.getMonth();
  const mn=calM.toLocaleString('th-TH',{month:'long',year:'numeric'});
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++) cells.push({d:new Date(y,m,0).getDate()-first+1+i,o:true});
  for(let d=1;d<=days;d++) cells.push({d,o:false});
  while(cells.length%7) cells.push({d:cells.length-days-first+1,o:true});
  const today=new Date();
  const byDay={};
  items.forEach(i=>{if(i.date){const[iy,im,id]=i.date.split('-').map(Number);if(iy===y&&im===m+1) byDay[id]=(byDay[id]||[]).concat(i);}});
  return `<div>
    <div class="cal-header">
      <span class="cal-title">${mn}</span>
      <div class="cal-nav">
        <button onclick="calP()">‹</button>
        <button onclick="calT()" style="width:auto;padding:0 10px;font-size:12px">วันนี้</button>
        <button onclick="calN()">›</button>
      </div>
    </div>
    <div class="cal-grid">
      ${['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=>`<div class="cal-day-lbl">${d}</div>`).join('')}
      ${cells.map(c=>{
        const isT=!c.o&&y===today.getFullYear()&&m===today.getMonth()&&c.d===today.getDate();
        const evts=(!c.o&&byDay[c.d])||[];
        return `<div class="cal-cell${c.o?' other':''}${isT?' today':''}">
          <div class="cal-num">${c.d}</div>
          ${evts.map(e=>{
            const col=CEVT[e.platforms[0]]||'#888';
            return `<div class="cal-evt" style="background:${col}22;color:${col};border-left:2px solid ${col}" onclick="openModal(${e.id})">${e.title.split('—')[0].trim()}</div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderReview(){
  const d=filtered().filter(i=>i.rev&&i.status!=='Done');
  if(!d.length) return '<div class="empty">✅ ไม่มีงานที่รอ Review แล้ว</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>ชื่อ</th><th>ประเภท</th><th>Platform</th><th>Deadline</th><th>Status</th><th>Action</th></tr></thead>
    <tbody>${d.map(i=>`<tr>
      <td class="cell-title">${i.title}</td>
      <td><span class="badge ${TBADGE[i.type]||'b-ig'}">${i.type}</span></td>
      <td>${pbadges(i.platforms)}</td>
      <td style="font-size:12px;color:var(--muted)">${i.date||'—'}</td>
      <td><span class="status"><span class="dot ${SDOT[i.status]||'d-none'}"></span>${i.status||'—'}</span></td>
      <td style="white-space:nowrap">
        <button class="act-btn" onclick="setDone(${i.id})" title="Mark done" style="color:var(--green-light)">✓ Done</button>
        <button class="act-btn" onclick="openModal(${i.id})">✎</button>
      </td>
    </tr>`).join('')}</tbody></table></div>`;
}

function setDone(id){const i=items.find(x=>x.id===id);if(i){i.status='Done';i.rev=false;}render();}
function calP(){calM=new Date(calM.getFullYear(),calM.getMonth()-1,1);render();}
function calN(){calM=new Date(calM.getFullYear(),calM.getMonth()+1,1);render();}
function calT(){calM=new Date();calM.setDate(1);render();}

function openModal(id){
  eid=id||null;
  const it=id?items.find(i=>i.id===id):{title:'',cap:'',type:'Daily Story',platforms:[],date:'',status:'Not started',rev:false,notes:''};
  document.getElementById('mtitle').textContent=id?'แก้ไขคอนเทนต์':'เพิ่มคอนเทนต์';
  document.getElementById('f-title').value=it.title;
  document.getElementById('f-cap').value=it.cap;
  document.getElementById('f-type').value=it.type;
  document.getElementById('f-date').value=it.date;
  document.getElementById('f-status').value=it.status||'Not started';
  document.getElementById('f-rev').value=it.rev?'1':'0';
  document.getElementById('f-notes').value=it.notes;
  ['IG Post','IG Story','TikTok','Xiaohongshu','Facebook'].forEach((v,i)=>{
    document.getElementById('p'+i).checked=it.platforms.includes(v);
  });
  document.getElementById('mbg').style.display='flex';
}
function closeModal(){document.getElementById('mbg').style.display='none';eid=null;}
function closeMBg(e){if(e.target.id==='mbg')closeModal();}
function saveItem(){
  const platforms=['IG Post','IG Story','TikTok','Xiaohongshu','Facebook'].filter((_,i)=>document.getElementById('p'+i).checked);
  const data={
    title:document.getElementById('f-title').value||'Untitled',
    cap:document.getElementById('f-cap').value,
    type:document.getElementById('f-type').value,
    platforms,date:document.getElementById('f-date').value,
    status:document.getElementById('f-status').value,
    rev:document.getElementById('f-rev').value==='1',
    notes:document.getElementById('f-notes').value
  };
  if(eid){const idx=items.findIndex(i=>i.id===eid);items[idx]={...items[idx],...data};}
  else items.push({id:nid++,...data});
  closeModal();render();
}
function del(id){if(confirm('ลบรายการนี้?')){items=items.filter(i=>i.id!==id);render();}}

function render(){
  renderStats();
  const m=document.getElementById('main');
  if(view==='table') m.innerHTML=renderTable();
  else if(view==='board') m.innerHTML=renderBoard();
  else if(view==='calendar') m.innerHTML=renderCalendar();
  else m.innerHTML=renderReview();
}
render();
</script>
</body>
